name = "revanced-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
ALLOWED_ORIGINS = "*"
ENVIRONMENT = "production"
GITHUB_ORGANIZATIONS = "ReVanced"
GITHUB_TOKEN = "dummy_token"

[env.production]
vars = { ALLOWED_ORIGINS = "*", ENVIRONMENT = "production", GITHUB_ORGANIZATIONS = "ReVanced", GITHUB_TOKEN = "dummy_token" }

[observability]
enabled = true

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true
